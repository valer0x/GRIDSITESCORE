version: "1.1.0"
description: >
  Rule-based, configurable scoring rubric for early-stage infrastructure site
  due diligence. Each rule produces a normalized [0,1] sub-score using a
  piecewise-linear mapping between a "worst" and "best" threshold, then rules
  are weighted within a category, and categories are weighted into a final
  0-100 score. Every rule emits a human-readable reason explaining the number.

category_weights:
  grid_access: 0.30
  energy: 0.25
  digital: 0.15
  resilience: 0.30

rules:
  grid_access:
    - name: hv_line_proximity
      metric: nearest_hv_line_km
      weight: 0.50
      type: inverse_linear   # lower value = higher score
      best: 5.0              # <= 5 km to HV line: full credit
      worst: 50.0            # >= 50 km: zero credit
      unit: km
      label: "Distance to nearest high-voltage transmission line"
    - name: substations_50km
      metric: substations_50km
      weight: 0.30
      type: linear           # higher value = higher score
      worst: 0
      best: 5
      unit: count
      label: "Substations within 50 km"
    - name: substations_10km
      metric: substations_10km
      weight: 0.20
      type: linear
      worst: 0
      best: 2
      unit: count
      label: "Substations within 10 km"

  energy:
    - name: installed_capacity
      metric: total_capacity_mw_50km
      weight: 0.45
      type: linear
      worst: 0
      best: 1000.0           # 1 GW of nearby generation = full credit
      unit: MW
      label: "Installed generation capacity within 50 km"
    - name: fuel_diversity
      metric: fuel_diversity_shannon
      weight: 0.30
      type: linear
      worst: 0.0
      best: 1.3              # Shannon index ~ ln(4) for 4 equally-mixed fuels
      unit: index
      label: "Fuel-mix diversity (Shannon index)"
    - name: renewable_share
      metric: renewable_share
      weight: 0.25
      type: linear
      worst: 0.0
      best: 0.30             # >=30% renewables within 50 km
      unit: fraction
      label: "Renewable share of nearby generation"

  digital:
    - name: nearest_dc_proximity
      metric: nearest_dc_km
      weight: 0.60
      type: inverse_linear
      best: 20.0             # <=20 km: in a DC cluster
      worst: 200.0           # >=200 km: isolated
      unit: km
      label: "Distance to nearest existing data center"
    - name: dc_count_100km
      metric: dc_count_100km
      weight: 0.40
      type: linear
      worst: 0
      best: 3
      unit: count
      label: "Data centers within 100 km (cluster effect)"

  resilience:
    - name: avg_node_degree
      metric: avg_degree
      weight: 0.40
      type: linear
      worst: 1.0             # dead-end topology
      best: 2.5              # well-meshed
      unit: degree
      label: "Average substation degree in 100 km graph"
    - name: nearest_substation_degree
      metric: nearest_substation_degree
      weight: 0.35
      type: linear
      worst: 1               # dead-end feeder
      best: 3                # 3+ independent connections
      unit: degree
      label: "Connectivity of nearest substation"
    - name: articulation_points
      metric: articulation_points_20km
      weight: 0.25
      type: inverse_linear
      best: 0                # no single-point-of-failure nodes
      worst: 3               # multiple SPOFs nearby
      unit: count
      label: "Articulation points (single-points-of-failure) within 20 km"
